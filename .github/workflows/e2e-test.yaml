name: End-to-end Tests

on:
  workflow_dispatch:
    inputs:
      operatorVersion:
        description: Authorino Operator version
        required: true
        default: latest

permissions:
  contents: read

jobs:
  e2e-tests:
    name: End-to-end Tests
    strategy:
      matrix:
        platform: [ubuntu-latest]
        authconfig_version: [v1beta3]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go
      - name: Install jq
        run: sudo apt-get install jq
      - name: Run make e2e
        env:
          OPERATOR_VERSION: ${{ github.event.inputs.operatorVersion }}
          AUTHCONFIG_VERSION: ${{ matrix.authconfig_version }}
        run: |
          make e2e
