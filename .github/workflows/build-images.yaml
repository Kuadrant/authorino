name: Build and push image

on:
  push:
    branches:
      - 'main'
      - 'master'
  workflow_dispatch: {}
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. 0.26.0)"
        type: string
        required: true
      ref:
        description: "Git ref to build from (e.g. v0.26.0)"
        type: string
        required: true

env:
  IMG_TAGS: ${{ github.sha }}
  IMG_REGISTRY_HOST: quay.io
  IMG_REGISTRY_ORG: kuadrant
  MAIN_BRANCH_NAME: main

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare build info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build-info.outputs.version }}
      version_tag: ${{ steps.build-info.outputs.version_tag }}
      git_sha: ${{ steps.build-info.outputs.git_sha }}
      dirty: ${{ steps.build-info.outputs.dirty }}
    steps:
      - name: Set Authorino build info
        id: build-info
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "version_tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ ${GITHUB_REF_NAME/\//-} =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            tag=${GITHUB_REF_NAME/\//-}
            echo "version=${tag#v}" >> $GITHUB_OUTPUT
            echo "version_tag=${tag}" >> $GITHUB_OUTPUT
          elif [[ ${GITHUB_REF_NAME/\//-} == "main" ]]; then
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "version_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
          echo "git_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "dirty=false" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-latest
          - platform: linux/s390x
            runner: ubuntu-latest
          - platform: linux/ppc64le
            runner: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # ratchet:docker/setup-buildx-action@v3
      - name: Login to registry
        if: ${{ !env.ACT }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # ratchet:docker/login-action@v3
        with:
          registry: ${{ env.IMG_REGISTRY_HOST }}
          username: ${{ secrets.IMG_REGISTRY_USERNAME }}
          password: ${{ secrets.IMG_REGISTRY_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # ratchet:docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            version=${{ needs.prepare.outputs.version }}
            git_sha=${{ needs.prepare.outputs.git_sha }}
            dirty=${{ needs.prepare.outputs.dirty }}
          outputs: type=image,name=${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino,push-by-digest=true,name-canonical=true,push=${{ !env.ACT }}
          provenance: false
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-platform manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    needs: [ prepare, build ]
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # ratchet:docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # ratchet:docker/metadata-action@v5
        with:
          images: ${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version_tag }}
            type=raw,value=${{ github.sha }},enable=${{ needs.prepare.outputs.version_tag == 'latest' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.version_tag == 'latest' }}
      - name: Login to registry
        if: ${{ !env.ACT }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # ratchet:docker/login-action@v3
        with:
          registry: ${{ env.IMG_REGISTRY_HOST }}
          username: ${{ secrets.IMG_REGISTRY_USERNAME }}
          password: ${{ secrets.IMG_REGISTRY_TOKEN }}
      - name: Create manifest list and push
        if: ${{ !env.ACT }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino@sha256:%s ' *)
      - name: Inspect image
        if: ${{ !env.ACT }}
        id: inspect
        run: |
          docker buildx imagetools inspect ${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino:${{ needs.prepare.outputs.version_tag }}

          digest=$(docker buildx imagetools inspect ${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino:${{ needs.prepare.outputs.version_tag }} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> $GITHUB_OUTPUT
      - name: Install cosign
        if: ${{ !env.ACT }}
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # ratchet:sigstore/cosign-installer@v3
      - name: Sign image with cosign
        if: ${{ !env.ACT }}
        run: |
          cosign sign --yes ${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino@${{ steps.inspect.outputs.digest }}
      - name: Attest build provenance
        if: ${{ !env.ACT }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # ratchet:actions/attest@v4
        with:
          subject-name: ${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/authorino
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true
